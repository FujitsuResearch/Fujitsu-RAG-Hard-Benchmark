- no.: '20'
  question: 能登半島地震の発災時、熊本地震よりもテレビ放送の利用割合が高かった理由、一方で一部地域で利用割合が顕著に低かった理由、今回の災害で分かったテレビ放送の課題を教えてください。また、この課題の解決に取り組む場合、総務省の補助はもらえますか？
  answer: '能登半島地震の発災時に熊本地震よりもテレビ放送の利用割合が高かったのは、熊本地震の本震発災が午前１時半頃であるのに対し、能登半島地震の発災は元日の午後4時頃であり、能登半島地震では発災直前にテレビを見ていた、または直後にテレビをつけることができた人が熊本地震より比率が高かった可能性がある。

    一部地域で利用割合が顕著に低かったのは、被害が大きかった地域では、発災時にテレビ放送を利用できない被災者が多くいたためと考えられる。

    能登半島地震では、テレビ放送に関して、停電や伝送路の断線等による停波が発生した。災害時に充実した情報を被災者に確実に届けるため、様々な情報伝達手段を通じた災害情報の提供を促進するとともに、より一層、放送ネットワークの強靱化に取り組む必要がある。

    総務省の補助については、地方公共団体等であれば1/2、地上基幹放送事業者等であれば1/3の補助率で支援を受けることができます。'
