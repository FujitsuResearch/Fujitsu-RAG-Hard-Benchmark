  answer: Vertical areasとは、Fujitsu Uvanceのサービスのうち、社会課題を解決する、Sustainable Manufacturing、Consumer Experience、Healthy Living、Trusted Societyの4分野のことです。Fujitsu Uvanceの中でも収益性が高い分野で、今後の成長ドライバーとなります。2025年度にVertical areasで売上総利益率40%以上をターゲットとしています。グローバルに展開する体制も整備しています。Vertical areasのオファリングのリリースを本格化した2023年度は、売上収益が前年度比84%増の3,679億円と大幅に伸長し、富士通のコア事業であるサービスソリューション事業の売上収益に占める割合も、前年度の約10%から約17%に拡大しました。2023年度下期からは、実際に価値ベースの価格設定を行いながら商品の企画・開発を進めており、同期間以降に市場に投入した約30のVertical areasのオファリングのうち、3分の2が価値ベースの価格設定を採用しています。主要オファリングとしてはDynamic SCMというサプライチェーン全体におけるデータ活用とプロセス変革を進めるSustainable Manufacturingのオファリングがあります。
