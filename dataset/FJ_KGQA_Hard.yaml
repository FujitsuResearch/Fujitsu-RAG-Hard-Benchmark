- no.: '2'
  question: 豆腐製造における衛生管理計画の例について、重要管理点と、各重要管理点に対する管理基準を教えてください。また、重要管理点と管理基準の用語の意味を教えてください。
  answer: 重要管理点は３つあり、(1)大豆の煮沸温度・時間　(2)充填豆腐の加熱、殺菌温度・時間　(3)販売ケース、冷蔵庫、チラー水の温度確認です。それぞれの管理基準は、(1)沸騰状態で2分以上または同等以上の煮沸　(2)90℃、40分以上か同等以上の効力を持つ方法で　(3)温度計で10℃以下です。重要管理点とは、危害要因の発生の防止、排除又は許容できる水準にまで低減するために管理措置を講ずることが不可欠な工程です。管理基準とは、個々の重要管理点において、危害要因の発生の防止、排除又は許容できる水準にまで低減するための基準です。
  question_type: Definition/Description
  retrieval_level: Medium
  answer_level: Medium
  answer_skill: 表の読み取り、記載通りに回答
  tag: 表、テキスト
