  question: 手のひら静脈認証とは何か教えてください。メリットも教えてください。
  answer: 手のひらをセンサー面にかざして非接触で静脈パターンを複数回連続撮影し最適画像で自動照合する方式で、皮膚表面の状態に左右されず、軽快で安定した認証を実現。メリットとしては、静脈は体内情報で盗まれにくいので安全性が高いこと、静脈本数が多く複雑に交差していて認証精度が高いこと、非接触で衛生的かつ手をかざすだけの簡単操作なので受容性が高いことが挙げられます。
