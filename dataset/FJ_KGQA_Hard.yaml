  question: LIFEBOOK U7314/Rの無線WANモデルを購入しました。SIMカードのセット方法と接続方法を教えてください。
  answer: "セット方法：\n1. パソコン本体の電源を切ります。\n2. OFFボタンを押します。\n3. くぼみにつめの先端をかけ、カードスロットカバーを矢印の方向に開きます。\n4. nanoSIMカードをnanoSIMカードスロットに「カチッ」と音がするまで差し込みます。\n5. カードスロットカバーを閉じます。\n\n接続方法（Windows の自動設定により、特に設定しなくても接続できる場合があります。）：\n1. 「スタート」ボタン→「設定」の順にクリックします。\n2. 「ネットワークとインターネット」→「携帯電話」の順にクリックします。\n3. 「この SIM カードの携帯データネットワークを使う」のプルダウンメニューから「SIM」または、「SIM1」を選択します。 \n4. 「携帯電話会社の設定」または「詳細オプション」をクリックします。 \n5. 「携帯ネットワーク」をクリックし、電波を停止します。 \n6. 「APN を追加」または「APN を追加します」をクリックします。 \n7. 通信事業者から提供された情報を入力し、「Save」または「保存」をクリックします。\n8. Windows10 の場合は、「インターネット APN 設定が保存されました。」と表示されたら「OK」をクリックします。 \n9. 「携帯ネットワーク」をクリックして手順 5 で停止した電波を再開します。 "
