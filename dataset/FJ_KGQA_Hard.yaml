- no.: '62'
  question: 日本企業はなぜ米国に比べてIT投資に積極的ではないのですか？
  answer: 日本企業の営業利益率は米国企業の営業利益率と比較するとおおよそ半分である。営業利益率の高い会社では、IT予算比率も高くIT投資にも積極的であるため、日本企業よりも米国企業のほうがIT投資に積極的な傾向にある。ただし、日本で導入できるハードウェアやシステムの調達価格が安価かつ高品質であることが、売上高に対してIT投資比が少ないことに結びついているとの指摘もある。
