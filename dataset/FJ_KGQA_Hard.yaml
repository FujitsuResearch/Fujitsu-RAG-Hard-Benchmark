- no.: '90'
  question: LIFEBOOK U7314/Rの無線WANモデルのeSIM接続方法とEIDの確認方法を教えてください。
  answer: "接続方法：\n1. 「スタート」ボタン→「設定」の順にクリックします。\n2. 「ネットワークとインターネット」→「携帯電話」の順にクリックします。\n3. 「この SIM カードの携帯データネットワークを使う」のプルダウンメニューから「eSIM」または、「SIM2」を選択します。  \n4. Wi-Fi ネットワークに接続します。\n5. 「eSIM プロファイル」または「eSIM プロファイルの管理」をクリックします。 \n6. 「通信事業者の eSIM プロファイルを追加」から「プロファイルの追加」をクリックします。 \n7.「携帯電話会社から提供されたアクティブ化コードを入力する」を選択して「次へ」をクリックします。 \n8. 「携帯電話会社から提供されたアクティブ化コードを入力する」を選択した場合は、カメラが起動し、QR コードのスキャン画面が表示されます。QR コードを入手している場合は、QR コードをスキャンしてください。そうでない場合は、アクティブ化コードを入力して「次へ」をクリックします。 \n9. eSIM プロファイルがダウンロードされ利用可能になります。 \n10. 追加された eSIM プロファイルをクリックします。\n11. ダウンロードで読み込まれたプロファイル選択し、「使用」をクリックします。 \n12. 「はい」をクリックするとプロファイルがアクティブとなり、eSIM の使用準備が完了します。\n13. プロファイルがアクティブとなり、eSIM の使用準備が完了後、「モバイルブロードバンドデバイスの設定」が開始されます。\n14. 次にプロファイルの設定を行うことで接続できます。\n\nEID確認方法：\n1. 「スタート」ボタン→「設定」の順にクリックします。\n2. 「ネットワークとインターネット」→「携帯電話」の順にクリックします。\n3. 「この SIM カードの携帯データネットワークを使う」のプルダウンメニューから「eSIM」または、「SIM2」を選択します。  \n4. 「eSIM プロファイル」または「eSIM プロファイルの管理」をクリックします。 \n5. 「eSIM のプロパティ」に表示されている EID を確認します。 "
