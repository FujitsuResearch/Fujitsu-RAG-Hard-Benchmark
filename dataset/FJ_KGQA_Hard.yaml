- no.: '27'
  question: 電気通信事業政策の接続ルールなどの整備に関して、何が見直されましたか？内容を簡単にまとめてください。
  answer: '音声通信における状況変化を踏まえた見直しとして、固定電話網のIP網への移行後、メタルIP電話、ワイヤレス固定電話及びひかり電話を同一の接続料とし、接続料の算定方法を規定するなどの制度整備を行った。

    モバイル接続料等の算定方法の見直しとして、MNO各社の2023年度接続会計において、音声通信に関する接続料とデータ通信に関する接続料の双方を算定する際の考え方（費用・資産の配賦基準）の見直しが行われた。

    卸電気通信役務に係る制度の見直しとして、卸元事業者の交渉上の優位性等を是正するため、電気通信事業法の一部を改正する法律（令和4年法律第70号）により、そのうち事業者間の適正な競争関係に及ぼす影響が少なくないものの役務提供義務や協議における情報提示義務が課されることとなった。'
